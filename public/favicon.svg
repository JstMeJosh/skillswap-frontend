<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad1)"/>
  
  <!-- Left arrow pointing right -->
  <g>
    <path d="M 16 28 L 32 28" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
    <polygon points="37,28 30,24 30,32" fill="white"/>
  </g>
  
  <!-- Right arrow pointing left -->
  <g>
    <path d="M 48 36 L 32 36" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
    <polygon points="27,36 34,40 34,32" fill="white"/>
  </g>
  
  <!-- Two circles representing people/skills -->
  <circle cx="16" cy="32" r="4" fill="white" opacity="0.9"/>
  <circle cx="48" cy="32" r="4" fill="white" opacity="0.9"/>
</svg>